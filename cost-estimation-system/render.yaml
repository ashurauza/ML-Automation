services:
  - type: web
    name: cost-estimation-backend
    env: docker
    rootDir: cost-estimation-system/backend
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true

  - type: web
    name: cost-estimation-frontend
    env: static
    rootDir: cost-estimation-system/frontend
    buildCommand: if [ -d "cost-estimation-system/frontend" ]; then cd cost-estimation-system/frontend; elif [ -d "frontend" ]; then cd frontend; fi; npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cost-estimation-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
